<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Axxon GGW | Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="./login.css">
</head>

<body>

  <main class="login-container">

    <section class="brand-section">

      <div class="brand-content">

        <span class="brand-tag">
          AXXON
        </span>

        <h1>
          Gestão Inteligente de Grupos WhatsApp
        </h1>

        <p>
          Centralize campanhas, grupos, automações e métricas em um único painel.
        </p>

      </div>

    </section>

    <section class="form-section">

      <div class="login-card">

        <h2>
          Bem-vindo de volta
        </h2>

        <p class="subtitle">
          Faça login para acessar o GGW.
        </p>

        <form id="login-form">

          <div class="input-group">
            <label for="email">E-mail</label>

            <input type="email" id="email" placeholder="seu@email.com" required>
          </div>

          <div class="input-group">
            <label for="password">Senha</label>

            <input type="password" id="password" placeholder="********" required>
          </div>

          <button type="submit" class="login-button">
            Entrar
          </button>

        </form>

      </div>

    </section>

  </main>

  <script src="./login.js"></script>

</body>

</html>
